name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run demos
        run: npm run demo

      - name: Check generated outputs
        run: |
          grep -q "below_floor" examples/reviews/medical_safety_floor_review.md
          grep -q "proofwashing" examples/reviews/medical_safety_floor_review.md
          grep -q "match basis" examples/reviews/medical_safety_floor_review.md
          grep -q "scope_mismatch" examples/reviews/org_readiness_floor_review.md
          grep -q "meets_floor" examples/reviews/portfolio_floor_review.md
          grep -q "Boundary Note" examples/reviews/medical_safety_floor_review.md
          ! grep -q "Revised" examples/reviews/medical_safety_floor_review.md
